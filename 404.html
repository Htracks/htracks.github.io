<!DOCTYPE html>
<html lang="en">
  <head>
    <title>404</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: white;
        color: black;
        margin: 0;
        padding: 0;
        text-align: center;
		align: center;
      }

      h1 {
        font-size: 32px;
        margin-top: 16px;
        margin-bottom: 20px;
      }
	  .canvas {
		align: center;
		margin: 70px;
	  }
    </style>
  </head>
  <body>
    <h1>404 - Page Not Found</h1>
    <canvas id="canvas"></canvas>
    <script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let g_canvasWidth = window.innerWidth;
let g_canvasHeight = window.innerHeight;

let g_keys = {};
let g_mouseX = 0;
let g_mouseY = 0;
let g_debug = true;

let g_delta = 0;
let g_deltaTemp = Date.now();

const g_grid = [];
const g_gridWidth = 13;
const g_gridHeight = 7;
for(let i = 0; i < g_gridWidth * g_gridHeight; ++i) {
	g_grid[i] = getRandomInt(256);
}

const g_camera = {
	posX: 0,
	posY: 0
};

window.addEventListener("keydown", function(event) {
	g_keys[event.key] = true; 
});
window.addEventListener("keyup", function(event) {
	g_keys[event.key] = false;
});

window.addEventListener("mousemove", function(event) {
	g_mouseX = event.clientX;
	g_mouseY = event.clientY;
});

window.addEventListener("click", function(event) {
/* todo
	const canvasScale = g_canvasSize / 16;
	const x = Math.floor((g_mouseX + g_camera.posX) / canvasScale) % 16;
	const y = Math.floor((g_mouseY + g_camera.posY) / canvasScale) * 16;
	g_grid[x + y] = 0;
*/
});

function getRandomInt(max) {
  return Math.floor(Math.random() * max);
}

function update(deltaTime) {
/* todo
	const speed = 0.25;
	const dx = g_mouseX - g_canvasSize / 2;
	const dy = g_mouseY - g_canvasSize / 2;
	const length = Math.sqrt(dx * dx + dy * dy);
	if (length > 16 && g_keys["w"]) {
		g_camera.posX += dx / length * speed * deltaTime;
		g_camera.posY += dy / length * speed * deltaTime;
	}
*/
}

function render() {
	ctx.canvas.width = g_canvasWidth;
	ctx.canvas.height = g_canvasHeight;
	ctx.imageSmoothingEnabled = false;
	const canvasScale = g_canvasSize / 16;
		
	// chunks
	for(let width = 0; width < g_gridWidth; width++) {
		for(let height = 0; height < g_gridHeight; height++) {
			const id = g_grid[width + height * 16];
			ctx.fillStyle = `rgba(0, 0, 0, ${id/256})`;
			ctx.fillRect(width *  canvasScale - g_camera.posX, height *  canvasScale - g_camera.posY,  canvasScale * 1.00, canvasScale * 1.00);
		}
	}
}

function loop() {
	g_canvasSize = ((window.innerWidth > window.innerHeight) ? window.innerHeight : window.innerWidth)
	
	// delta time
	temp = Date.now();
	g_delta = temp - g_deltaTemp;
	g_deltaTemp = temp;
	
	update(g_delta);
	render();
	requestAnimationFrame(loop);
}

loop();

    </script>
  </body>
</html>
